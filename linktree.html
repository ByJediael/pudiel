<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pudiel | Links</title>
  <meta name="description" content="Links oficiais do Pudiel — Pudim gourmet para eventos." />

  <!-- Open Graph -->
  <meta property="og:title" content="Pudiel | Links" />
  <meta property="og:description" content="Pudim gourmet para casamentos, aniversários e eventos corporativos." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/images/carrinho-noite-cozy.jpg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #f7f4ef;
      --paper: #fffdf9;
      --ink: #1f1b16;
      --muted: #6c6258;
      --caramel: #9c5e2d;
      --gold: #d9b06b;
      --line: #e6dbcf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: "DM Sans", Arial, sans-serif;
      color: var(--ink);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .linktree {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* ── Header ── */
    .lt-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .lt-logo {
      width: 100px;
      height: auto;
      margin-bottom: 0.25rem;
    }

    .lt-tagline {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      max-width: 30ch;
    }

    /* ── Links ── */
    .lt-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .lt-link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      width: 100%;
      padding: 0.95rem 1.25rem;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      position: relative;
    }

    .lt-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(31, 27, 22, 0.08);
      border-color: #d4c4b0;
    }

    .lt-link:active {
      transform: translateY(0);
    }

    .lt-link-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .lt-link-icon svg {
      width: 20px;
      height: 20px;
    }

    .lt-link-text {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .lt-link-text small {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 400;
    }

    .lt-link-arrow {
      position: absolute;
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .lt-link:hover .lt-link-arrow {
      opacity: 1;
    }

    .lt-link-arrow svg {
      width: 16px;
      height: 16px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Icon colors */
    .icon-whatsapp {
      background: rgba(37, 211, 102, 0.1);
    }
    .icon-whatsapp svg { fill: #25D366; }

    .icon-instagram {
      background: linear-gradient(135deg, rgba(245, 96, 64, 0.1), rgba(188, 42, 141, 0.1));
    }
    .icon-instagram svg { fill: #E1306C; }

    .icon-site {
      background: rgba(156, 94, 45, 0.1);
    }
    .icon-site svg {
      stroke: var(--caramel);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-location {
      background: rgba(217, 176, 107, 0.1);
    }
    .icon-location svg {
      stroke: var(--gold);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-email {
      background: rgba(31, 27, 22, 0.06);
    }
    .icon-email svg {
      stroke: var(--ink);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Footer ── */
    .lt-footer {
      margin-top: 0.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
    }

    .lt-footer a {
      color: var(--caramel);
      text-decoration: none;
    }

    /* ── Subtle entrance animation ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lt-header {
      animation: fadeUp 0.5s ease both;
    }

    .lt-link:nth-child(1) { animation: fadeUp 0.5s ease 0.1s both; }
    .lt-link:nth-child(2) { animation: fadeUp 0.5s ease 0.15s both; }
    .lt-link:nth-child(3) { animation: fadeUp 0.5s ease 0.2s both; }
    .lt-link:nth-child(4) { animation: fadeUp 0.5s ease 0.25s both; }
    .lt-link:nth-child(5) { animation: fadeUp 0.5s ease 0.3s both; }

    .lt-footer {
      animation: fadeUp 0.5s ease 0.4s both;
    }
  </style>
</head>
<body>
